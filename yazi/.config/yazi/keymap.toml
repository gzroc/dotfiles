# TOML 校验器（如 Tombi）可使用此 schema 验证配置。
# 如遇问题，请在以下地址提交 issue：https://github.com/yazi-rs/schemas
#:schema https://yazi-rs.github.io/schemas/keymap.json
[mgr]
keymap = [
	{ on = "<Esc>", run = "escape",             desc = "退出可视模式、清除选择或取消搜索" },
	{ on = "<C-[>", run = "escape",             desc = "退出可视模式、清除选择或取消搜索" },
	{ on = "q",     run = "quit",               desc = "退出程序" },
	{ on = "Q",     run = "quit --no-cwd-file", desc = "退出程序（不输出 cwd 文件）" },
	{ on = "<C-c>", run = "close",              desc = "关闭当前标签页，若为最后一个则退出" },
	{ on = "<C-z>", run = "suspend",            desc = "挂起进程" },
	# 跳行
	{ on = "k", run = "arrow prev", desc = "上一个文件" },
	{ on = "j", run = "arrow next", desc = "下一个文件" },
	{ on = "<Up>",   run = "arrow prev", desc = "上一个文件" },
	{ on = "<Down>", run = "arrow next", desc = "下一个文件" },
	{ on = "<C-u>", run = "arrow -50%",  desc = "向上移动半页" },
	{ on = "<C-d>", run = "arrow 50%",   desc = "向下移动半页" },
	{ on = "<C-b>", run = "arrow -100%", desc = "向上移动一页" },
	{ on = "<C-f>", run = "arrow 100%",  desc = "向下移动一页" },
	{ on = "<S-PageUp>",   run = "arrow -50%",  desc = "向上移动半页" },
	{ on = "<S-PageDown>", run = "arrow 50%",   desc = "向下移动半页" },
	{ on = "<PageUp>",     run = "arrow -100%", desc = "向上移动一页" },
	{ on = "<PageDown>",   run = "arrow 100%",  desc = "向下移动一页" },
	{ on = [ "g", "g" ], run = "arrow top", desc = "跳到顶部" },
	{ on = "G",          run = "arrow bot", desc = "跳到底部" },
	# 目录导航
	{ on = "h", run = "leave", desc = "返回上级目录" },
	{ on = "l", run = "enter", desc = "进入子目录" },
	{ on = "<Left>",  run = "leave", desc = "返回上级目录" },
	{ on = "<Right>", run = "enter", desc = "进入子目录" },
	{ on = "H", run = "back",    desc = "返回上一个目录" },
	{ on = "L", run = "forward", desc = "前进到下一个目录" },
	# 选择切换
	{ on = "<Space>", run = [ "toggle", "arrow 1" ], desc = "切换当前文件的选中状态" },
	{ on = "<C-a>",   run = "toggle_all --state=on", desc = "全选文件" },
	{ on = "<C-r>",   run = "toggle_all",            desc = "反转所有文件的选中状态" },
	# 可视模式
	{ on = "v", run = "visual_mode",         desc = "进入可视模式（选择模式）" },
	{ on = "V", run = "visual_mode --unset", desc = "进入可视模式（取消选择模式）" },
	# 预览滚动
	{ on = "I", run = "seek -5", desc = "预览向上滚动 5 行" },
	{ on = "U", run = "seek 5",  desc = "预览向下滚动 5 行" },
	# 文件速览
	{ on = "<Tab>", run = "spot", desc = "速览悬停文件" },
	# 文件操作
	{ on = "o",         run = "open",                        desc = "打开选中文件" },
	{ on = "O",         run = "open --interactive",          desc = "交互式打开选中文件" },
	{ on = "<Enter>",   run = "open",                        desc = "打开选中文件" },
	{ on = "<S-Enter>", run = "open --interactive",          desc = "交互式打开选中文件" },
	{ on = "y",         run = "yank",                        desc = "复制选中文件" },
	{ on = "x",         run = "yank --cut",                  desc = "剪切选中文件" },
	{ on = "p",         run = "paste",                       desc = "粘贴文件" },
	{ on = "P",         run = "paste --force",               desc = "粘贴文件（目标存在则覆盖）" },
	{ on = "-",         run = "link",                        desc = "创建绝对路径符号链接" },
	{ on = "_",         run = "link --relative",             desc = "创建相对路径符号链接" },
	{ on = "<C-->",     run = "hardlink",                    desc = "创建硬链接" },
	{ on = "Y",         run = "unyank",                      desc = "取消复制/剪切状态" },
	{ on = "X",         run = "unyank",                      desc = "取消复制/剪切状态" },
	{ on = "d",         run = "remove",                      desc = "将选中文件移入回收站" },
	{ on = "D",         run = "remove --permanently",        desc = "永久删除选中文件" },
	{ on = "a",         run = "create",                      desc = "新建文件（以 / 结尾则为目录）" },
	{ on = "A",         run = "bulk_create",                 desc = "批量新建文件" },
	{ on = "r",         run = "rename --cursor=before_ext",  desc = "重命名选中文件" },
	{ on = ";",         run = "shell --interactive",         desc = "执行 shell 命令" },
	{ on = ":",         run = "shell --block --interactive", desc = "执行 shell 命令（阻塞直到完成）" },
	{ on = ".",         run = "hidden toggle",               desc = "切换隐藏文件显示" },
	{ on = "s",         run = "search --via=fd",             desc = "通过 fd 按文件名搜索" },
	{ on = "S",         run = "search --via=rg",             desc = "通过 ripgrep 按内容搜索" },
	{ on = "<C-s>",     run = "escape --search",             desc = "取消正在进行的搜索" },
	{ on = "z",         run = "plugin fzf",                  desc = "通过 fzf 跳转到文件或目录" },
	{ on = "Z",         run = "plugin zoxide",               desc = "通过 zoxide 跳转到目录" },
	# 行模式
	{ on = [ "m", "s" ], run = "linemode size",        desc = "行模式：显示大小" },
	{ on = [ "m", "p" ], run = "linemode permissions", desc = "行模式：显示权限" },
	{ on = [ "m", "b" ], run = "linemode btime",       desc = "行模式：显示创建时间" },
	{ on = [ "m", "m" ], run = "linemode mtime",       desc = "行模式：显示修改时间" },
	{ on = [ "m", "o" ], run = "linemode owner",       desc = "行模式：显示所有者" },
	{ on = [ "m", "n" ], run = "linemode none",        desc = "行模式：不显示附加信息" },
	# 复制路径
	{ on = [ "c", "c" ], run = "copy path",             desc = "复制文件完整路径" },
	{ on = [ "c", "d" ], run = "copy dirname",          desc = "复制目录路径" },
	{ on = [ "c", "f" ], run = "copy filename",         desc = "复制文件名" },
	{ on = [ "c", "n" ], run = "copy name_without_ext", desc = "复制不含扩展名的文件名" },
	# 过滤
	{ on = "f", run = "filter --smart", desc = "过滤文件" },
	# 查找
	{ on = "/", run = "find --smart",            desc = "向后查找文件" },
	{ on = "?", run = "find --previous --smart", desc = "向前查找文件" },
	{ on = "n", run = "find_arrow",              desc = "跳到下一个匹配" },
	{ on = "N", run = "find_arrow --previous",   desc = "跳到上一个匹配" },
	# 排序
	{ on = [ ",", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime" ],  desc = "按修改时间排序" },
	{ on = [ ",", "M" ], run = [ "sort mtime --reverse=yes", "linemode mtime" ], desc = "按修改时间排序（倒序）" },
	{ on = [ ",", "b" ], run = [ "sort btime --reverse=no", "linemode btime" ],  desc = "按创建时间排序" },
	{ on = [ ",", "B" ], run = [ "sort btime --reverse=yes", "linemode btime" ], desc = "按创建时间排序（倒序）" },
	{ on = [ ",", "e" ], run = "sort extension --reverse=no",                    desc = "按扩展名排序" },
	{ on = [ ",", "E" ], run = "sort extension --reverse=yes",                   desc = "按扩展名排序（倒序）" },
	{ on = [ ",", "a" ], run = "sort alphabetical --reverse=no",                 desc = "按字母排序" },
	{ on = [ ",", "A" ], run = "sort alphabetical --reverse=yes",                desc = "按字母排序（倒序）" },
	{ on = [ ",", "n" ], run = "sort natural --reverse=no",                      desc = "自然排序" },
	{ on = [ ",", "N" ], run = "sort natural --reverse=yes",                     desc = "自然排序（倒序）" },
	{ on = [ ",", "s" ], run = [ "sort size --reverse=no", "linemode size" ],    desc = "按大小排序" },
	{ on = [ ",", "S" ], run = [ "sort size --reverse=yes", "linemode size" ],   desc = "按大小排序（倒序）" },
	{ on = [ ",", "r" ], run = "sort random --reverse=no",                       desc = "随机排序" },
	# 目录跳转
	{ on = [ "g", "h" ],       run = "cd ~",             desc = "跳转到主目录" },
	{ on = [ "g", "c" ],       run = "cd ~/.config",     desc = "跳转到 ~/.config" },
	{ on = [ "g", "d" ],       run = "cd ~/Downloads",   desc = "跳转到 ~/Downloads" },
	{ on = [ "g", "<Space>" ], run = "cd --interactive", desc = "交互式跳转目录" },
	{ on = [ "g", "f" ],       run = "follow",           desc = "跟随悬停的符号链接" },
	# 标签页
	{ on = [ "t", "t" ], run = "tab_create --current",     desc = "在当前目录新建标签页" },
	{ on = [ "t", "r" ], run = "tab_rename --interactive", desc = "重命名当前标签页" },
	{ on = "1", run = "tab_switch 0", desc = "切换到第 1 个标签页" },
	{ on = "2", run = "tab_switch 1", desc = "切换到第 2 个标签页" },
	{ on = "3", run = "tab_switch 2", desc = "切换到第 3 个标签页" },
	{ on = "4", run = "tab_switch 3", desc = "切换到第 4 个标签页" },
	{ on = "5", run = "tab_switch 4", desc = "切换到第 5 个标签页" },
	{ on = "6", run = "tab_switch 5", desc = "切换到第 6 个标签页" },
	{ on = "7", run = "tab_switch 6", desc = "切换到第 7 个标签页" },
	{ on = "8", run = "tab_switch 7", desc = "切换到第 8 个标签页" },
	{ on = "9", run = "tab_switch 8", desc = "切换到第 9 个标签页" },
	{ on = "[", run = "tab_switch -1 --relative", desc = "切换到上一个标签页" },
	{ on = "]", run = "tab_switch 1 --relative",  desc = "切换到下一个标签页" },
	{ on = "{", run = "tab_swap -1", desc = "与上一个标签页互换位置" },
	{ on = "}", run = "tab_swap 1",  desc = "与下一个标签页互换位置" },
	# 任务管理
	{ on = "w", run = "tasks:show", desc = "显示任务管理器" },
	# 帮助
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]
[tasks]
keymap = [
	{ on = "<Esc>", run = "close", desc = "关闭任务管理器" },
	{ on = "<C-[>", run = "close", desc = "关闭任务管理器" },
	{ on = "<C-c>", run = "close", desc = "关闭任务管理器" },
	{ on = "w",     run = "close", desc = "关闭任务管理器" },
	{ on = "k", run = "arrow prev", desc = "上一个任务" },
	{ on = "j", run = "arrow next", desc = "下一个任务" },
	{ on = "<Up>",   run = "arrow prev", desc = "上一个任务" },
	{ on = "<Down>", run = "arrow next", desc = "下一个任务" },
	{ on = "<Enter>", run = "inspect", desc = "查看任务详情" },
	{ on = "x",       run = "cancel",  desc = "取消任务" },
	# 帮助
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]
[spot]
keymap = [
	{ on = "<Esc>", run = "close", desc = "关闭速览" },
	{ on = "<C-[>", run = "close", desc = "关闭速览" },
	{ on = "<C-c>", run = "close", desc = "关闭速览" },
	{ on = "<Tab>", run = "close", desc = "关闭速览" },
	{ on = "k", run = "arrow prev", desc = "上一行" },
	{ on = "j", run = "arrow next", desc = "下一行" },
	{ on = "h", run = "swipe prev", desc = "滑动到上一个文件" },
	{ on = "l", run = "swipe next", desc = "滑动到下一个文件" },
	{ on = "<Up>",    run = "arrow prev", desc = "上一行" },
	{ on = "<Down>",  run = "arrow next", desc = "下一行" },
	{ on = "<Left>",  run = "swipe prev", desc = "滑动到上一个文件" },
	{ on = "<Right>", run = "swipe next", desc = "滑动到下一个文件" },
	# 复制
	{ on = [ "c", "c" ], run = "copy cell", desc = "复制选中单元格" },
	# 帮助
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]
[pick]
keymap = [
	{ on = "<Esc>",   run = "close",          desc = "取消选择" },
	{ on = "<C-[>",   run = "close",          desc = "取消选择" },
	{ on = "<C-c>",   run = "close",          desc = "取消选择" },
	{ on = "<Enter>", run = "close --submit", desc = "确认选择" },
	{ on = "k", run = "arrow prev", desc = "上一个选项" },
	{ on = "j", run = "arrow next", desc = "下一个选项" },
	{ on = "<Up>",   run = "arrow prev", desc = "上一个选项" },
	{ on = "<Down>", run = "arrow next", desc = "下一个选项" },
	# 帮助
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]
[input]
keymap = [
	{ on = "<C-c>",   run = "close",          desc = "取消输入" },
	{ on = "<Enter>", run = "close --submit", desc = "提交输入" },
	{ on = "<Esc>",   run = "escape",         desc = "返回普通模式，或取消输入" },
	{ on = "<C-[>",   run = "escape",         desc = "返回普通模式，或取消输入" },
	# 模式切换
	{ on = "i", run = "insert",                          desc = "进入插入模式" },
	{ on = "I", run = [ "move first-char", "insert" ],   desc = "移到行首非空字符，进入插入模式" },
	{ on = "a", run = "insert --append",                 desc = "进入追加模式" },
	{ on = "A", run = [ "move eol", "insert --append" ], desc = "移到行尾，进入追加模式" },
	{ on = "v", run = "visual",                          desc = "进入可视模式" },
	{ on = "r", run = "replace",                         desc = "替换单个字符" },
	# 选择
	{ on = "V",     run = [ "move bol", "visual", "move eol" ], desc = "选中从行首到行尾" },
	{ on = "<C-A>", run = [ "move eol", "visual", "move bol" ], desc = "选中从行尾到行首" },
	{ on = "<C-E>", run = [ "move bol", "visual", "move eol" ], desc = "选中从行首到行尾" },
	# 字符级移动
	{ on = "h",       run = "move -1", desc = "向左移动一个字符" },
	{ on = "l",       run = "move 1",  desc = "向右移动一个字符" },
	{ on = "<Left>",  run = "move -1", desc = "向左移动一个字符" },
	{ on = "<Right>", run = "move 1",  desc = "向右移动一个字符" },
	{ on = "<C-b>",   run = "move -1", desc = "向左移动一个字符" },
	{ on = "<C-f>",   run = "move 1",  desc = "向右移动一个字符" },
	# 单词级移动
	{ on = "b",         run = "backward",                    desc = "向左移动到当前或上一个单词开头" },
	{ on = "B",         run = "backward --far",              desc = "向左移动到当前或上一个 WORD 开头" },
	{ on = "w",         run = "forward",                     desc = "向右移动到下一个单词开头" },
	{ on = "W",         run = "forward --far",               desc = "向右移动到下一个 WORD 开头" },
	{ on = "e",         run = "forward --end-of-word",       desc = "向右移动到当前或下一个单词结尾" },
	{ on = "E",         run = "forward --far --end-of-word", desc = "向右移动到当前或下一个 WORD 结尾" },
	{ on = "<A-b>",     run = "backward",                    desc = "向左移动到当前或上一个单词开头" },
	{ on = "<A-f>",     run = "forward --end-of-word",       desc = "向右移动到当前或下一个单词结尾" },
	{ on = "<C-Left>",  run = "backward",                    desc = "向左移动到当前或上一个单词开头" },
	{ on = "<C-Right>", run = "forward --end-of-word",       desc = "向右移动到当前或下一个单词结尾" },
	# 行级移动
	{ on = "0",      run = "move bol",        desc = "移到行首" },
	{ on = "$",      run = "move eol",        desc = "移到行尾" },
	{ on = "_",      run = "move first-char", desc = "移到行首第一个非空字符" },
	{ on = "^",      run = "move first-char", desc = "移到行首第一个非空字符" },
	{ on = "<C-a>",  run = "move bol",        desc = "移到行首" },
	{ on = "<C-e>",  run = "move eol",        desc = "移到行尾" },
	{ on = "<Home>", run = "move bol",        desc = "移到行首" },
	{ on = "<End>",  run = "move eol",        desc = "移到行尾" },
	# 删除字符
	{ on = "<Backspace>", run = "backspace",         desc = "删除光标前的字符" },
	{ on = "<Delete>",    run = "backspace --under", desc = "删除光标下的字符" },
	{ on = "<C-h>",       run = "backspace",         desc = "删除光标前的字符" },
	{ on = "<C-d>",       run = "backspace --under", desc = "删除光标下的字符" },
	# 清除（Kill）
	{ on = "<C-u>",         run = "kill bol",      desc = "向左清除到行首" },
	{ on = "<C-k>",         run = "kill eol",      desc = "向右清除到行尾" },
	{ on = "<C-w>",         run = "kill backward", desc = "向左清除到当前单词开头" },
	{ on = "<A-d>",         run = "kill forward",  desc = "向右清除到当前单词结尾" },
	{ on = "<C-Backspace>", run = "kill backward", desc = "向左清除到当前单词开头" },
	{ on = "<C-Delete>",    run = "kill forward",  desc = "向右清除到当前单词结尾" },
	# 剪切 / 复制 / 粘贴
	{ on = "d", run = "delete --cut",                                      desc = "剪切选中字符" },
	{ on = "D", run = [ "delete --cut", "move eol" ],                      desc = "剪切到行尾" },
	{ on = "c", run = "delete --cut --insert",                             desc = "剪切选中字符并进入插入模式" },
	{ on = "C", run = [ "delete --cut --insert", "move eol" ],             desc = "剪切到行尾并进入插入模式" },
	{ on = "s", run = [ "delete --cut --insert", "move 1" ],               desc = "剪切当前字符并进入插入模式" },
	{ on = "S", run = [ "move bol", "delete --cut --insert", "move eol" ], desc = "剪切整行并进入插入模式" },
	{ on = "x", run = [ "delete --cut", "move 1 --in-operating" ],         desc = "剪切当前字符" },
	{ on = "y", run = "yank",                                              desc = "复制选中字符" },
	{ on = "p", run = "paste",                                             desc = "在光标后粘贴" },
	{ on = "P", run = "paste --before",                                    desc = "在光标前粘贴" },
	# 撤销 / 重做 / 大小写
	{ on = "u",     run = [ "undo", "casefy lower" ], desc = "撤销，或在可视模式下转为小写" },
	{ on = "U",     run = "casefy upper",             desc = "转为大写" },
	{ on = "<C-r>", run = "redo",                     desc = "重做上一步操作" },
	# 帮助
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]
[confirm]
keymap = [
	{ on = "<Esc>",   run = "close",          desc = "取消确认" },
	{ on = "<C-[>",   run = "close",          desc = "取消确认" },
	{ on = "<C-c>",   run = "close",          desc = "取消确认" },
	{ on = "<Enter>", run = "close --submit", desc = "提交确认" },
	{ on = "n", run = "close",          desc = "取消确认" },
	{ on = "y", run = "close --submit", desc = "提交确认" },
	{ on = "k", run = "arrow prev", desc = "上一行" },
	{ on = "j", run = "arrow next", desc = "下一行" },
	{ on = "<Up>",   run = "arrow prev", desc = "上一行" },
	{ on = "<Down>", run = "arrow next", desc = "下一行" },
	# 帮助
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]
[cmp]
keymap = [
	{ on = "<C-c>",   run = "close",                                      desc = "取消补全" },
	{ on = "<Tab>",   run = "close --submit",                             desc = "确认补全" },
	{ on = "<Enter>", run = [ "close --submit", "input:close --submit" ], desc = "确认补全并提交输入" },
	{ on = "<A-k>", run = "arrow prev", desc = "上一项" },
	{ on = "<A-j>", run = "arrow next", desc = "下一项" },
	{ on = "<Up>",   run = "arrow prev", desc = "上一项" },
	{ on = "<Down>", run = "arrow next", desc = "下一项" },
	{ on = "<C-p>", run = "arrow prev", desc = "上一项" },
	{ on = "<C-n>", run = "arrow next", desc = "下一项" },
	# 帮助
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]
[help]
keymap = [
	{ on = "<Esc>", run = "escape", desc = "清除过滤条件，或隐藏帮助" },
	{ on = "<C-[>", run = "escape", desc = "清除过滤条件，或隐藏帮助" },
	{ on = "<C-c>", run = "close",  desc = "隐藏帮助" },
	# 导航
	{ on = "k", run = "arrow prev", desc = "上一行" },
	{ on = "j", run = "arrow next", desc = "下一行" },
	{ on = "<Up>",   run = "arrow prev", desc = "上一行" },
	{ on = "<Down>", run = "arrow next", desc = "下一行" },
	# 过滤
	{ on = "f", run = "filter", desc = "过滤帮助项" },
]

